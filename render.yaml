services:
  - type: web
    name: furniture-intelligence-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: DATANEWTON_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://furniture-intelligence-frontend.onrender.com
    healthCheckPath: /health

  - type: web
    name: furniture-intelligence-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://furniture-intelligence-api.onrender.com
